# This workflow warns and then closes issues and PRs that have had no activity for a specified amount of time.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/actions/stale
name: Mark stale issues and pull requests

on:
  workflow_dispatch:
  schedule:
  - cron: '36 11 * * *'

jobs:
  stale:

    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v5
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: 'This issue has been automatically marked as stale because it has had no recent activity. If this is still relevant, please comment with an update or any additional details to keep it open. Otherwise, this issue may be closed automatically after a further period of inactivity. Maintainers can also remove the "no-issue-activity" label to prevent automatic closure.'
        stale-pr-message: 'This pull request has been automatically marked as stale due to a lack of recent activity. If you are still working on this or would like it to remain open, please add a comment or push new commits. Otherwise, this PR may be closed automatically after a further period of inactivity. Maintainers can also remove the "no-pr-activity" label to prevent automatic closure.'
        stale-issue-label: 'no-issue-activity'
        stale-pr-label: 'no-pr-activity'
